<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Bora Formar - Criar conta</title>
        <link rel="stylesheet" href="../css/register.css">
    </head>
    <body>
        <header id="header-content"></header>

        <main id="main-content">
            <h1>Criar Conta</h1>
            <form id="form-register">
                <label>E-mail:</label>
                <input id="email" class="form-item" type="email" required>
                <label>Nome:</label>
                <input id="name" class="form-item" type="text" required>
                <label>Telefone:</label>
                <input id="phone-number" class="form-item" type="tel" required>
                <label>Usuário:</label>
                <input id="user" class="form-item" type="text" required>
                <label>Senha:</label>
                <input id="password" class="form-item" type="password" required>

                <p id="form-error" class="hidden"></p>
                <p id="form-success" class="hidden"></p>

                <div id="buttons-login">
                    <input id="button-login" type="submit" value="Criar">
                    <a id="button-register" href="login.html">Fazer login</a>
                </div>
            </form>
        </main>

        <footer id="footer-content">
            <p>© 2026 | Bora formar</p>
        </footer>

        <script type="module">
            import authService from "../js/services/authService.js";

            const form = document.getElementById("form-register");
            const errorMessage = document.getElementById("form-error");
            const successMessage = document.getElementById("form-success");

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                errorMessage.classList.add("hidden");
                successMessage.classList.add("hidden");

                const email = document.getElementById("email").value;
                const name = document.getElementById("name").value;
                const telefone = document.getElementById("phone-number").value;
                const login = document.getElementById("user").value;
                const senha = document.getElementById("password").value;

                try {
                    await authService.register({ name, email, telefone, login, senha });
                    successMessage.textContent = "Conta criada com sucesso! Redirecionando para o login...";
                    successMessage.classList.remove("hidden");

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                } catch (error) {
                    errorMessage.textContent = error.message || "Não foi possível criar a conta.";
                    errorMessage.classList.remove("hidden");
                }
            });
        </script>
    </body>
</html>
