<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Bora Formar - Criar Sala</title>
        <link rel="stylesheet" href="../css/criar-sala.css">
    </head>
    <body>
        <header id="header-content">
            <button id="menu-toggle" aria-label="Menu">☰</button>
            <h1>Salas</h1>
        </header>
        <main id="main-content">
            <h2>Criar Sala</h2>
            <form id="form-criar-sala">
                <label>Nome:</label>
                <input id="name" class="form-item" type="text" required>
                <label>Meta:</label>
                <input id="goal" class="form-item" type="number" step="0.01" required>
                <label>Turma:</label>
                <input id="team" class="form-item" type="text" required>
                <label>Curso:</label>
                <input id="course" class="form-item" type="text" required>

                <p id="form-error" class="hidden"></p>

                <input id="button-criar" type="submit" value="Criar">
            </form>
        </main>

        <script type="module">
            import groupService from "../js/services/groupService.js";
            import { getCurrentUserId } from "../js/jwtUtils.js";

            const form = document.getElementById("form-criar-sala");
            const errorMessage = document.getElementById("form-error");

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                errorMessage.classList.add("hidden");

                const name = document.getElementById("name").value;
                const goal = document.getElementById("goal").value;
                const team = document.getElementById("team").value;
                const course = document.getElementById("course").value;
                const createdBy = getCurrentUserId();

                try {
                    await groupService.create({ name, goal, team, course, createdBy });
                    window.location.href = "salas.html";
                } catch (error) {
                    errorMessage.textContent = error.message || "Não foi possível criar a sala.";
                    errorMessage.classList.remove("hidden");
                }
            });
        </script>
    </body>
</html>
